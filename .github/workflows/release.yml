name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: make build-ui

      - name: Build server (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/nat-backup-server-linux-amd64 \
            ./cmd/server

      - name: Build agent (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/nat-backup-agent-linux-amd64 \
            ./cmd/agent

      - name: Build agent (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/nat-backup-agent-linux-arm64 \
            ./cmd/agent

      - name: Build agent (windows/amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/nat-backup-agent-windows-amd64.exe \
            ./cmd/agent

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/nat-backup-server-linux-amd64
            bin/nat-backup-agent-linux-amd64
            bin/nat-backup-agent-linux-arm64
            bin/nat-backup-agent-windows-amd64.exe
            scripts/install.sh
            scripts/install-agent.ps1
