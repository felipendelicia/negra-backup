services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nat_backup
      POSTGRES_USER: nat_backup
      POSTGRES_PASSWORD: nat_backup_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nat_backup"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
